  <script>
    (function () {
      var panel = document.getElementById("via-mobile-panel");
      var toggle = document.querySelector(".via-mobile-menu-toggle");
      var closeButton = document.querySelector(".via-mobile-panel-close");
      var overlay = document.getElementById("via-mobile-menu-overlay");
      if (!panel || !toggle || !overlay) return;

      function setOpenState(open) {
        panel.classList.toggle("via-mobile-panel-open", open);
        document.body.classList.toggle("via-mobile-panel-open", open);
        panel.setAttribute("aria-hidden", (!open).toString());
        toggle.setAttribute("aria-expanded", open ? "true" : "false");
      }

      function closePanel() { setOpenState(false); }

      toggle.addEventListener("click", function () {
        setOpenState(!panel.classList.contains("via-mobile-panel-open"));
      });

      if (closeButton) closeButton.addEventListener("click", closePanel);
      overlay.addEventListener("click", closePanel);

      panel.querySelectorAll("a").forEach(function (link) {
        link.addEventListener("click", closePanel);
      });

      document.addEventListener("keydown", function (event) {
        if (event.key === "Escape") closePanel();
      });
    })();
  </script>

  <script>
    (function () {
      var navbar = document.querySelector('.via-navbar');
      if (!navbar) return;

      var lastY = window.scrollY || window.pageYOffset || 0;
      var delta = 6;

      function showNavbar() { navbar.classList.remove('via-navbar-scroll-hidden'); }
      function hideNavbar() { navbar.classList.add('via-navbar-scroll-hidden'); }

      function handleScroll() {
        if (window.innerWidth < 992) {
          showNavbar();
          return;
        }

        var currentY = window.scrollY || window.pageYOffset || 0;

        if (currentY <= 10) {
          showNavbar();
          lastY = currentY;
          return;
        }

        if (currentY > lastY + delta) hideNavbar();
        else if (currentY < lastY - delta) showNavbar();

        lastY = currentY;
      }

      window.addEventListener('scroll', handleScroll, { passive: true });
      window.addEventListener('resize', handleScroll);
      handleScroll();
    })();
  </script>
